<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">

            margin: 0;

            min-height: 100vh;
            background: linear-gradient(145deg, #f5f7fc 0%, #e9eef4 100%);

            justify-content: center;
            align-items: center;
            padding: 8px;
        }
        .game-container {
            max-width: 820px;
            width: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 28px;
            box-shadow: 0 15px 30px rgba(0,10,30,0.15);
            padding: 16px 12px 24px;
            border: 1px solid rgba(255,255,255,0.6);
            margin: 0 auto;
        }
        .header-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

            font-weight: 700;
            font-size: 1.7rem;
            color: #1a2e4b;
            letter-spacing: -0.5px;
        }
        .timer-small {
            background: #1e3a5f;
            color: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.8rem;
            box-shadow: 0 2px 6px #0f2a4420;
        }
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px 10px;
            margin: 8px 0 4px;
        }
        .process-group-select {
            background: white;
            border: 1.5px solid #b8c9dd;
            border-radius: 30px;
            padding: 8px 16px;
            font-weight: 600;
            font-size: 0.75rem;
            color: #1e3a5f;
            outline: none;
            cursor: pointer;
            box-shadow: 0 2px 4px #00000008;
        }
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .mini-btn {
            background: #eef2f6;
            border: 1px solid #b8c9dd;
            color: #1e3a5f;
            padding: 8px 12px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            box-shadow: 0 2px 4px #00000008;
            white-space: nowrap;
        }
        .mini-btn.active {
            background: #1e3a5f;
            color: white;
            border-color: #1e3a5f;
        }
        .mini-btn.reset-btn {
            background: #fce4d6;
            border-color: #c44536;
            color: #a1301a;
        }
        .count-badge {
            margin-left: 4px;
            background: rgba(0,0,0,0.1);
            padding: 2px 6px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .score-panel {
            display: flex;
            justify-content: space-between;
            background: #ffffffd0;
            padding: 10px 16px;
            border-radius: 50px;
            margin: 10px 0 16px;
            font-weight: 500;
            flex-wrap: wrap;
            gap: 6px;
            backdrop-filter: blur(4px);
        }
        .badge {
            background: #1e3a5f;
            color: white;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        .process-card {
            background: white;
            border-radius: 24px;
            padding: 16px 18px;
            margin-bottom: 18px;
            box-shadow: 0 6px 14px -6px #1e3a5f1a;
        }
        .process-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 16px;
            margin-bottom: 10px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 0.9rem;
            border-bottom: 1px dashed #b0c8dd;
            padding-bottom: 10px;
        }
        .process-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0b1e2e;
            line-height: 1.2;
            word-break: break-word;
        }
        .itto-question {
            background: #eef3fa;
            border-radius: 22px;
            padding: 22px 16px;
            margin: 15px 0;
            border-left: 5px solid #1e3a5f;
        }
        .itto-desc {
            font-size: 1.3rem;
            font-weight: 600;
            color: #0a1c2c;
            text-align: center;
            line-height: 1.4;
            word-break: break-word;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 18px 0 8px;
        }
        .option-btn {
            background: white;
            border: none;
            border-radius: 50px;
            padding: 14px 18px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e3a5f;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            border: 1.5px solid #cddae6;
            min-width: 105px;
            cursor: pointer;
            transition: all 0.15s;
            background: rgba(255,255,255,0.95);
            flex: 0 1 auto;
        }
        .option-btn:hover {
            background: #1e3a5f;
            color: white;
        }
        .option-btn:disabled {
            opacity: 0.6;
            pointer-events: none;
        }

            margin: 12px 0 18px;
            background: #f8fafd;
            display: flex;

        .wrong-feedback { background: #ffe6d9; color: #a1301a; border-left: 6px solid #c44536; }

            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 8px;
        }
        .action-btn {
            background: #1e3a5f;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            padding: 14px 20px;

            border: 1px solid #b8c9dd;

<div class="game-container">
    <div class="header-row">
        <h1>📋 ITTO·矩阵</h1>
        <div class="timer-small" id="timerDisplay">⏱️ 00:00</div>
    </div>

    <!-- 新增：过程组下拉筛选 + 按钮组 -->
    <div class="filter-row">
        <select id="processGroupSelect" class="process-group-select">
            <option value="all">全部过程组</option>
            <option value="启动过程组">启动过程组</option>
            <option value="规划过程组">规划过程组</option>
            <option value="执行过程组">执行过程组</option>
            <option value="监控过程组">监控过程组</option>
            <option value="收尾过程组">收尾过程组</option>
        </select>
        <div class="filter-buttons">
            <button class="mini-btn" id="loadAllBtn">📚 全部 <span id="allCount" class="count-badge">0</span></button>
            <button class="mini-btn active" id="loadWrongBtn">❌ 错题本 <span id="wrongCount" class="count-badge">0</span></button>
            <button class="mini-btn" id="loadCorrectBtn">✅ 对题本 <span id="correctCount" class="count-badge">0</span></button>
            <button class="mini-btn reset-btn" id="resetBtn">🔄 重置</button>
        </div>
    </div>

    <div class="score-panel">
        <span>🏆 得分: <span id="scoreDisplay">0</span></span>
        <span>📌 进度: <span id="progressDisplay">0/0</span></span>
        <span class="badge" id="streakBadge">⚡ 连对 0</span>
    </div>

    <div class="process-card">
        <div class="process-meta">
            <span id="processGroupLabel">启动过程组</span>
            <span id="knowledgeAreaLabel">整合管理</span>
        </div>
        <div class="process-name" id="processNameLabel">01. 制定项目章程</div>
    </div>

    <div class="itto-question">
        <div style="font-size:0.8rem; color:#2b4a6e; margin-bottom:6px;">🔍 以下属于？</div>
        <div class="itto-desc" id="ittoText">立项管理文件 - 商业需求</div>
    </div>

    <div class="options">
        <button class="option-btn" id="inputBtn">📥 输入</button>
        <button class="option-btn" id="toolBtn">🛠️ 工具与技术</button>
        <button class="option-btn" id="outputBtn">📤 输出</button>
    </div>

    <div class="feedback" id="feedbackArea">✨ 点击上方按钮做出选择</div>

    <div class="action-bar">
        <button class="action-btn secondary" id="skipBtn">⏭️ 跳过</button>
        <button class="action-btn" id="nextBtn">▶️ 下一题</button>
    </div>

    <div class="expand-section">
        <details>
            <summary>📚 49过程速查矩阵</summary>
            <div class="mini-table" id="matrixTable"></div>
        </details>
        <details>
            <summary>📥 输入 (Input) 速查 · 按过程</summary>
            <div class="mini-table" id="inputMatrix"></div>
        </details>
        <details>
            <summary>🛠️ 工具与技术 (Tools) 速查 · 按过程</summary>
            <div class="mini-table" id="toolMatrix"></div>
        </details>
        <details>
            <summary>📤 输出 (Output) 速查 · 按过程</summary>
            <div class="mini-table" id="outputMatrix"></div>
        </details>
    </div>
    <div class="footer-note">⚡ 错题优先 · 计时学习 · 数据自动保存</div>
</div>

        let allQuestions = [];
        processesData.forEach((proc, procIdx) => {
            const addItems = (type, items) => {
                items.forEach(text => {
                    allQuestions.push({
                        procIdx,
                        process: proc,
                        type: type,
                        text: text,
                        id: `${procIdx}-${type}-${text}`
                    });
                });
            };
            addItems('input', proc.inputs);
            addItems('tool', proc.tools);
            addItems('output', proc.outputs);
        });

        // 状态变量
        let currentQuestion = null;
        let answered = false;
        let optionsDisabled = false;
        let score = 0;
        let totalAnswered = 0;
        let streak = 0;
        let wrongSet = new Set();
        let correctSet = new Set();
        let filterMode = 'wrong';     // 'all','wrong','correct'
        let processGroupFilter = 'all'; // 新增过程组过滤

        let secondsElapsed = 0;

        // DOM 元素
        const pgLabel = document.getElementById('processGroupLabel');
        const kaLabel = document.getElementById('knowledgeAreaLabel');
        const pNameLabel = document.getElementById('processNameLabel');
        const ittoText = document.getElementById('ittoText');
        const feedbackDiv = document.getElementById('feedbackArea');
        const scoreSpan = document.getElementById('scoreDisplay');
        const progressSpan = document.getElementById('progressDisplay');
        const streakSpan = document.getElementById('streakBadge');
        const inputBtn = document.getElementById('inputBtn');
        const toolBtn = document.getElementById('toolBtn');
        const outputBtn = document.getElementById('outputBtn');
        const nextBtn = document.getElementById('nextBtn');
        const skipBtn = document.getElementById('skipBtn');
        const loadAllBtn = document.getElementById('loadAllBtn');
        const loadWrongBtn = document.getElementById('loadWrongBtn');
        const loadCorrectBtn = document.getElementById('loadCorrectBtn');
        const resetBtn = document.getElementById('resetBtn');
        const timerDisplay = document.getElementById('timerDisplay');
        const processGroupSelect = document.getElementById('processGroupSelect');
        const allCountSpan = document.getElementById('allCount');
        const wrongCountSpan = document.getElementById('wrongCount');
        const correctCountSpan = document.getElementById('correctCount');

        // 计时器
        function updateTimerDisplay() {
            const mins = Math.floor(secondsElapsed / 60);
            const secs = secondsElapsed % 60;
            timerDisplay.textContent = `⏱️ ${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
        }
        setInterval(() => { secondsElapsed++; updateTimerDisplay(); }, 1000);
        updateTimerDisplay();

        // 激活按钮样式
        function setActiveFilterButton(mode) {
            [loadAllBtn, loadWrongBtn, loadCorrectBtn].forEach(btn => btn.classList.remove('active'));
            if (mode === 'all') loadAllBtn.classList.add('active');
            if (mode === 'wrong') loadWrongBtn.classList.add('active');
            if (mode === 'correct') loadCorrectBtn.classList.add('active');
        }

        // 存储
        const STORAGE_KEYS = { WRONG:'pmbok_itto_wrong_v2', CORRECT:'pmbok_itto_correct_v2', SCORE:'pmbok_score', TOTAL:'pmbok_total', STREAK:'pmbok_streak' };
        function saveToStorage() {
            localStorage.setItem(STORAGE_KEYS.WRONG, JSON.stringify([...wrongSet]));
            localStorage.setItem(STORAGE_KEYS.CORRECT, JSON.stringify([...correctSet]));
            localStorage.setItem(STORAGE_KEYS.SCORE, score);
            localStorage.setItem(STORAGE_KEYS.TOTAL, totalAnswered);
            localStorage.setItem(STORAGE_KEYS.STREAK, streak);
        }
        function loadFromStorage() {
            try {
                const w = localStorage.getItem(STORAGE_KEYS.WRONG); if(w) wrongSet = new Set(JSON.parse(w));
                const c = localStorage.getItem(STORAGE_KEYS.CORRECT); if(c) correctSet = new Set(JSON.parse(c));
                score = parseInt(localStorage.getItem(STORAGE_KEYS.SCORE)) || 0;
                totalAnswered = parseInt(localStorage.getItem(STORAGE_KEYS.TOTAL)) || 0;
                streak = parseInt(localStorage.getItem(STORAGE_KEYS.STREAK)) || 0;
            } catch(e) {}
            updateStats();
        }

        // 重置
        function fullReset() {
            wrongSet.clear(); correctSet.clear();
            score = 0; totalAnswered = 0; streak = 0;
            secondsElapsed = 0; updateTimerDisplay();
            filterMode = 'wrong'; setActiveFilterButton('wrong');
            processGroupSelect.value = 'all'; processGroupFilter = 'all';
            saveToStorage(); updateStats();
            loadNewQuestion();
            feedbackDiv.textContent = '✨ 已重置，错题模式';
            feedbackDiv.classList.remove('correct-feedback','wrong-feedback');
            updateCountDisplays();
        }

        // 获取当前可用题目 (考虑模式 + 过程组)
        function getAvailableQuestions() {
            let filtered = allQuestions;
            // 过程组过滤
            if (processGroupFilter !== 'all') {
                filtered = filtered.filter(q => q.process.pg === processGroupFilter);
            }
            // 对错题模式过滤
            if (filterMode === 'wrong') {
                filtered = filtered.filter(q => wrongSet.has(q.id));
            } else if (filterMode === 'correct') {
                filtered = filtered.filter(q => correctSet.has(q.id));
            }
            return filtered;
        }

        // 更新按钮上的计数
        function updateCountDisplays() {
            const base = (processGroupFilter === 'all') ? allQuestions : allQuestions.filter(q => q.process.pg === processGroupFilter);
            const allFiltered = base;
            const wrongFiltered = base.filter(q => wrongSet.has(q.id));
            const correctFiltered = base.filter(q => correctSet.has(q.id));
            allCountSpan.textContent = allFiltered.length;
            wrongCountSpan.textContent = wrongFiltered.length;
            correctCountSpan.textContent = correctFiltered.length;
        }

        function pickRandomQuestion() {
            const available = getAvailableQuestions();
            if (available.length === 0) return null;
            return available[Math.floor(Math.random() * available.length)];
        }

        function loadNewQuestion() {
            answered = false; optionsDisabled = false;
            [inputBtn, toolBtn, outputBtn].forEach(btn => btn.disabled = false);
            feedbackDiv.classList.remove('correct-feedback','wrong-feedback');
            
            let q = pickRandomQuestion();
            if (!q) {
                // 当前筛选无题目，自动切回全部模式
                if (filterMode !== 'all') {
                    filterMode = 'all';
                    setActiveFilterButton('all');
                }
                if (processGroupFilter !== 'all') {
                    processGroupFilter = 'all';
                    processGroupSelect.value = 'all';
                }
                q = pickRandomQuestion() || allQuestions[0];
                feedbackDiv.textContent = '⚠️ 当前筛选无题目，已显示全部';
            } else {
                const modeText = { all:'全部', wrong:'错题', correct:'对题' }[filterMode] || '';
                feedbackDiv.textContent = `🔎 题库: ${modeText} · 过程组: ${processGroupFilter==='all'?'全部':processGroupFilter}`;
            }
            currentQuestion = q;
            const proc = currentQuestion.process;
            pgLabel.textContent = proc.pg; kaLabel.textContent = proc.ka; pNameLabel.textContent = proc.name;
            ittoText.textContent = currentQuestion.text;
            
            updateStats();
            updateCountDisplays();
        }

        function updateStats() {
            scoreSpan.textContent = score;
            progressSpan.textContent = `${totalAnswered} 题`;
            streakSpan.textContent = `⚡ 连对 ${streak}`;
        }

        function handleAnswer(selectedType) {
            if (answered || optionsDisabled) return;
            answered = true; optionsDisabled = true;
            [inputBtn, toolBtn, outputBtn].forEach(btn => btn.disabled = true);

            const isCorrect = (selectedType === currentQuestion.type);
            const typeName = { input:'输入', tool:'工具与技术', output:'输出' }[currentQuestion.type];
            const qid = currentQuestion.id;
            
            // 从两个集合移除
            wrongSet.delete(qid);
            correctSet.delete(qid);
            
            if (isCorrect) {
                score += 10;
                streak += 1;
                correctSet.add(qid);
                feedbackDiv.classList.add('correct-feedback');
                feedbackDiv.classList.remove('wrong-feedback');
                feedbackDiv.textContent = `✅ 正确！“${currentQuestion.text}” 是 ${typeName}`;
            } else {
                streak = 0;
                wrongSet.add(qid);
                feedbackDiv.classList.add('wrong-feedback');
                feedbackDiv.classList.remove('correct-feedback');
                feedbackDiv.textContent = `❌ 错误。“${currentQuestion.text}” 应该是 【${typeName}】`;
            }
            totalAnswered++;
            saveToStorage();
            updateStats();
            updateCountDisplays();
        }

        function nextQuestion() { loadNewQuestion(); }
        function skipQuestion() {
            if (!answered) { streak = 0; totalAnswered++; saveToStorage(); updateStats(); }
            nextQuestion();
        }

        function switchMode(mode) {
            filterMode = mode;
            setActiveFilterButton(mode);
            loadNewQuestion();
        }

        // 过程组切换
        function onProcessGroupChange() {
            processGroupFilter = processGroupSelect.value;
            loadNewQuestion();
        }

        // 渲染速查表
        function renderMatrixTables() {
            let procHtml = '<table style="width:100%; border-collapse:collapse;"><tr style="background:#1e3a5f; color:white;"><th>过程组</th><th>领域</th><th>过程</th></tr>';
            processesData.forEach(p => { procHtml += `<tr><td>${p.pg}</td><td>${p.ka}</td><td>${p.name}</td></tr>`; });
            procHtml += '</table>'; document.getElementById('matrixTable').innerHTML = procHtml;

            let inputHtml = '<table style="width:100%; border-collapse:collapse;"><tr style="background:#1e3a5f; color:white;"><th>过程</th><th>主要输入</th></tr>';
            processesData.forEach(p => { inputHtml += `<tr><td>${p.name}</td><td>${p.inputs.join('；')}</td></tr>`; });
            inputHtml += '</table>'; document.getElementById('inputMatrix').innerHTML = inputHtml;

            let toolHtml = '<table style="width:100%; border-collapse:collapse;"><tr style="background:#1e3a5f; color:white;"><th>过程</th><th>主要工具与技术</th></tr>';
            processesData.forEach(p => { toolHtml += `<tr><td>${p.name}</td><td>${p.tools.join('；')}</td></tr>`; });
            toolHtml += '</table>'; document.getElementById('toolMatrix').innerHTML = toolHtml;

            let outputHtml = '<table style="width:100%; border-collapse:collapse;"><tr style="background:#1e3a5f; color:white;"><th>过程</th><th>主要输出</th></tr>';
            processesData.forEach(p => { outputHtml += `<tr><td>${p.name}</td><td>${p.outputs.join('；')}</td></tr>`; });
            outputHtml += '</table>'; document.getElementById('outputMatrix').innerHTML = outputHtml;
        }

        function initGame() {
            renderMatrixTables();
            loadFromStorage();
            setActiveFilterButton(filterMode);
            processGroupSelect.value = processGroupFilter;
            processGroupSelect.addEventListener('change', onProcessGroupChange);
            loadNewQuestion();
            inputBtn.addEventListener('click', ()=>handleAnswer('input'));
            toolBtn.addEventListener('click', ()=>handleAnswer('tool'));
            outputBtn.addEventListener('click', ()=>handleAnswer('output'));
            nextBtn.addEventListener('click', nextQuestion);
            skipBtn.addEventListener('click', skipQuestion);
            loadAllBtn.addEventListener('click', ()=>switchMode('all'));
            loadWrongBtn.addEventListener('click', ()=>switchMode('wrong'));
            loadCorrectBtn.addEventListener('click', ()=>switchMode('correct'));
            resetBtn.addEventListener('click', fullReset);
            updateCountDisplays();
        }

        initGame();
    })();
</script>
</body>
</html>
