<!DOCTYPE html>
<html lang="zh">
<head>

        }

            border-radius: 28px;

            border: 1px solid rgba(255,255,255,0.6);

        }

            justify-content: space-between;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

            font-size: 1.7rem;
            color: #1a2e4b;
            letter-spacing: -0.5px;
        }

            background: #1e3a5f;
            color: white;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.8rem;
            box-shadow: 0 2px 6px #0f2a4420;
        }
        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0 4px;
        }
        .mini-btn {
            background: #eef2f6;
            border: 1px solid #b8c9dd;
            color: #1e3a5f;
            padding: 8px 12px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            box-shadow: 0 2px 4px #00000008;
            flex: 0 1 auto;
            white-space: nowrap;
        }
        .mini-btn.active {
            background: #1e3a5f;
            color: white;
            border-color: #1e3a5f;
        }
        .mini-btn.reset-btn {
            background: #fce4d6;
            border-color: #c44536;
            color: #a1301a;
        }

            display: flex;
            justify-content: space-between;
            background: #ffffffd0;
            padding: 10px 16px;
            border-radius: 50px;
            margin: 10px 0 16px;
            font-weight: 500;
            flex-wrap: wrap;
            gap: 6px;
            backdrop-filter: blur(4px);
        }
        .badge {
            background: #1e3a5f;
            color: white;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        .process-card {
            background: white;
            border-radius: 24px;
            padding: 16px 18px;
            margin-bottom: 18px;
            box-shadow: 0 6px 14px -6px #1e3a5f1a;
        }
        .process-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 16px;
            margin-bottom: 10px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 0.9rem;
            border-bottom: 1px dashed #b0c8dd;
            padding-bottom: 10px;
        }
        .process-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0b1e2e;
            line-height: 1.2;
            word-break: break-word;
        }
        .itto-question {
            background: #eef3fa;
            border-radius: 22px;
            padding: 22px 16px;
            margin: 15px 0;
            border-left: 5px solid #1e3a5f;
        }
        .itto-desc {
            font-size: 1.3rem;
            font-weight: 600;
            color: #0a1c2c;
            text-align: center;
            line-height: 1.4;
            word-break: break-word;

            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 18px 0 8px;
        }

            background: white;
            border: none;
            border-radius: 50px;
            padding: 14px 18px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e3a5f;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            border: 1.5px solid #cddae6;
            min-width: 105px;
            cursor: pointer;
            transition: all 0.15s;
            background: rgba(255,255,255,0.95);
            flex: 0 1 auto;
        }
        .option-btn:hover {
            background: #1e3a5f;
            color: white;
        }
        .option-btn:disabled {
            opacity: 0.6;
            pointer-events: none;
        }

            padding: 12px 16px;
            border-radius: 30px;
            margin: 12px 0 18px;
            background: #f8fafd;

            gap: 12px;
            justify-content: center;

</head>
<body>
<div class="game-container">
    <!-- 标题 + 计时器 (小字体) -->
    <div class="header-row">
        <h1>📋 ITTO·矩阵</h1>
        <div class="timer-small" id="timerDisplay">⏱️ 00:00</div>
    </div>

    <!-- 功能按钮组 -->
    <div class="filter-buttons">
        <button class="mini-btn" id="loadAllBtn">📚 全部</button>
        <button class="mini-btn active" id="loadWrongBtn">❌ 错题本</button>
        <button class="mini-btn" id="loadCorrectBtn">✅ 对题本</button>
        <button class="mini-btn reset-btn" id="resetBtn">🔄 重置</button>
    </div>

    <!-- 计分板 -->
    <div class="score-panel">
        <span>🏆 得分: <span id="scoreDisplay">0</span></span>
        <span>📌 进度: <span id="progressDisplay">0/0</span></span>
        <span class="badge" id="streakBadge">⚡ 连对 0</span>
    </div>

    <!-- 当前过程信息 -->
    <div class="process-card">
        <div class="process-meta">
            <span id="processGroupLabel">启动过程组</span>
            <span id="knowledgeAreaLabel">整合管理</span>
        </div>
        <div class="process-name" id="processNameLabel">01. 制定项目章程</div>
    </div>

    <!-- 题目区域 -->
    <div class="itto-question">
        <div style="font-size:0.8rem; color:#2b4a6e; margin-bottom:6px;">🔍 以下属于？</div>
        <div class="itto-desc" id="ittoText">商业文件 - 商业论证</div>
    </div>

    <!-- 选项按钮 -->
    <div class="options">
        <button class="option-btn" id="inputBtn">📥 输入</button>
        <button class="option-btn" id="toolBtn">🛠️ 工具与技术</button>
        <button class="option-btn" id="outputBtn">📤 输出</button>
    </div>

    <!-- 反馈区 -->
    <div class="feedback" id="feedbackArea">✨ 点击上方按钮做出选择</div>

    <!-- 操作按钮 -->
    <div class="action-bar">
        <button class="action-btn secondary" id="skipBtn">⏭️ 跳过</button>
        <button class="action-btn" id="nextBtn">▶️ 下一题</button>
    </div>

    <div class="expand-section">
        <details>
            <summary>📚 49过程速查矩阵</summary>
            <div class="mini-table" id="matrixTable"></div>
        </details>
        <details>
            <summary>📥 输入 (Input) 速查 · 按过程</summary>

        </details>
        <details>
            <summary>🛠️ 工具与技术 (Tools) 速查 · 按过程</summary>
            <div class="mini-table" id="toolMatrix"></div>
        </details>
    </div>
    <div class="footer-note">⚡ 错题优先 · 计时学习 · 数据自动保存</div>
</div>

              tools:["沟通技术","沟通技能","项目报告"],

            { pg:"执行过程组", ka:"风险管理", name:"34. 实施风险应对",
              inputs:["风险管理计划","风险登记册"],
              tools:["专家判断","项目管理信息系统"],
              outputs:["变更请求"] },
            { pg:"执行过程组", ka:"采购管理", name:"35. 实施采购",
              inputs:["采购管理计划","采购文档","卖方建议书"],
              tools:["投标人会议","谈判"],
              outputs:["选定的卖方","协议"] },
            { pg:"执行过程组", ka:"相关方管理", name:"36. 管理干系人参与",
              inputs:["沟通管理计划","相关方参与计划","变更日志"],
              tools:["沟通技能","人际关系技能","基本规则"],
              outputs:["变更请求"] },
            { pg:"监控过程组", ka:"整合管理", name:"37. 监控项目工作",
              inputs:["项目管理计划","工作绩效信息","进度/成本预测"],
              tools:["专家判断","数据分析(趋势/偏差/挣值)","会议"],
              outputs:["工作绩效报告","变更请求"] },
            { pg:"监控过程组", ka:"整合管理", name:"38. 实施整体变更控制",
              inputs:["项目管理计划","变更请求","工作绩效报告"],
              tools:["专家判断","变更控制工具","决策"],
              outputs:["批准的变更请求"] },
            { pg:"监控过程组", ka:"范围管理", name:"39. 确认范围",
              inputs:["项目管理计划","需求文件","核实的可交付成果"],
              tools:["检查"],
              outputs:["验收的可交付成果"] },
            { pg:"监控过程组", ka:"范围管理", name:"40. 控制范围",
              inputs:["范围基准","需求跟踪矩阵","工作绩效数据"],
              tools:["数据分析(偏差/趋势)"],
              outputs:["工作绩效信息"] },
            { pg:"监控过程组", ka:"进度管理", name:"41. 控制进度",
              inputs:["进度管理计划","进度基准","工作绩效数据"],
              tools:["数据分析(挣值/偏差)","关键路径法","进度压缩"],
              outputs:["工作绩效信息","进度预测"] },
            { pg:"监控过程组", ka:"成本管理", name:"42. 控制成本",
              inputs:["成本基准","工作绩效数据"],
              tools:["数据分析(挣值/偏差/趋势)","完工尚需绩效指数"],
              outputs:["工作绩效信息","成本预测"] },
            { pg:"监控过程组", ka:"质量管理", name:"43. 控制质量",
              inputs:["质量管理计划","质量测量指标","可交付成果"],
              tools:["检查","数据表现(控制图)","统计抽样"],
              outputs:["质量控制测量结果","核实的可交付成果"] },
            { pg:"监控过程组", ka:"资源管理", name:"44. 控制资源",
              inputs:["资源管理计划","物质资源分配单","工作绩效数据"],
              tools:["数据分析(绩效审查)","问题解决","谈判"],
              outputs:["工作绩效信息"] },
            { pg:"监控过程组", ka:"沟通管理", name:"45. 监督沟通",
              inputs:["沟通管理计划","项目沟通记录","工作绩效数据"],
              tools:["专家判断","项目管理信息系统"],
              outputs:["工作绩效信息"] },
            { pg:"监控过程组", ka:"风险管理", name:"46. 监督风险",
              inputs:["风险管理计划","风险登记册","工作绩效数据"],
              tools:["数据分析(技术绩效/储备分析)","审计"],
              outputs:["工作绩效信息"] },
            { pg:"监控过程组", ka:"采购管理", name:"47. 控制采购",
              inputs:["采购管理计划","采购文档","工作绩效数据"],
              tools:["检查","审计","索赔管理"],
              outputs:["结束的采购"] },
            { pg:"监控过程组", ka:"相关方管理", name:"48. 监督干系人参与",
              inputs:["相关方参与计划","相关方登记册","工作绩效数据"],
              tools:["相关方参与度评估矩阵"],
              outputs:["工作绩效信息"] },
            { pg:"收尾过程组", ka:"整合管理", name:"49. 结束项目或阶段",
              inputs:["项目章程","验收的可交付成果","协议"],
              tools:["专家判断","会议"],
              outputs:["最终报告","组织过程资产更新"] }
        ];

        // ---------- 构建全量题库 ----------
        let allQuestions = [];
        processesData.forEach((proc, procIdx) => {
            const addItems = (type, items) => {
                items.forEach(text => {
                    allQuestions.push({
                        procIdx,
                        process: proc,
                        type: type,
                        text: text,
                        id: `${procIdx}-${type}-${text}`
                    });
                });
            };
            addItems('input', proc.inputs);
            addItems('tool', proc.tools);
            addItems('output', proc.outputs);
        });

        // ---------- 状态管理 ----------
        let currentQuestion = null;
        let answered = false;
        let optionsDisabled = false;
        let score = 0;
        let totalAnswered = 0;
        let streak = 0;
        let wrongSet = new Set();
        let correctSet = new Set();
        let filterMode = 'wrong';

        // DOM 元素
        const pgLabel = document.getElementById('processGroupLabel');
        const kaLabel = document.getElementById('knowledgeAreaLabel');
        const pNameLabel = document.getElementById('processNameLabel');
        const ittoText = document.getElementById('ittoText');
        const feedbackDiv = document.getElementById('feedbackArea');
        const scoreSpan = document.getElementById('scoreDisplay');
        const progressSpan = document.getElementById('progressDisplay');
        const streakSpan = document.getElementById('streakBadge');
        const inputBtn = document.getElementById('inputBtn');
        const toolBtn = document.getElementById('toolBtn');
        const outputBtn = document.getElementById('outputBtn');
        const nextBtn = document.getElementById('nextBtn');
        const skipBtn = document.getElementById('skipBtn');
        const loadAllBtn = document.getElementById('loadAllBtn');
        const loadWrongBtn = document.getElementById('loadWrongBtn');
        const loadCorrectBtn = document.getElementById('loadCorrectBtn');
        const resetBtn = document.getElementById('resetBtn');
        const timerDisplay = document.getElementById('timerDisplay');

        // 计时器
        let secondsElapsed = 0;
        function updateTimerDisplay() {
            const mins = Math.floor(secondsElapsed / 60);
            const secs = secondsElapsed % 60;
            timerDisplay.textContent = `⏱️ ${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
        }
        setInterval(() => { secondsElapsed++; updateTimerDisplay(); }, 1000);
        updateTimerDisplay();

        // 激活样式
        function setActiveFilterButton(mode) {
            [loadAllBtn, loadWrongBtn, loadCorrectBtn].forEach(btn => btn.classList.remove('active'));
            if (mode === 'all') loadAllBtn.classList.add('active');
            if (mode === 'wrong') loadWrongBtn.classList.add('active');
            if (mode === 'correct') loadCorrectBtn.classList.add('active');
        }

        // 存储
        const STORAGE_KEYS = { WRONG:'pmbok_itto_wrong', CORRECT:'pmbok_itto_correct', SCORE:'pmbok_score', TOTAL:'pmbok_total', STREAK:'pmbok_streak' };
        function saveToStorage() {
            localStorage.setItem(STORAGE_KEYS.WRONG, JSON.stringify([...wrongSet]));
            localStorage.setItem(STORAGE_KEYS.CORRECT, JSON.stringify([...correctSet]));
            localStorage.setItem(STORAGE_KEYS.SCORE, score);
            localStorage.setItem(STORAGE_KEYS.TOTAL, totalAnswered);
            localStorage.setItem(STORAGE_KEYS.STREAK, streak);
        }
        function loadFromStorage() {
            try {
                const w = localStorage.getItem(STORAGE_KEYS.WRONG); if(w) wrongSet = new Set(JSON.parse(w));
                const c = localStorage.getItem(STORAGE_KEYS.CORRECT); if(c) correctSet = new Set(JSON.parse(c));
                score = parseInt(localStorage.getItem(STORAGE_KEYS.SCORE)) || 0;
                totalAnswered = parseInt(localStorage.getItem(STORAGE_KEYS.TOTAL)) || 0;
                streak = parseInt(localStorage.getItem(STORAGE_KEYS.STREAK)) || 0;
            } catch(e) {}
            updateStats();
        }

        function fullReset() {
            wrongSet.clear(); correctSet.clear();
            score = 0; totalAnswered = 0; streak = 0;
            secondsElapsed = 0; updateTimerDisplay();
            filterMode = 'wrong'; setActiveFilterButton('wrong');
            saveToStorage(); updateStats();
            loadNewQuestion();
            feedbackDiv.textContent = '✨ 已重置，错题模式';
            feedbackDiv.classList.remove('correct-feedback','wrong-feedback');
        }

        function getAvailableQuestions() {
            let filtered = allQuestions;
            if (filterMode === 'wrong') {
                filtered = allQuestions.filter(q => wrongSet.has(q.id));
                if (filtered.length === 0) { filterMode = 'all'; setActiveFilterButton('all'); filtered = allQuestions; }
            } else if (filterMode === 'correct') {
                filtered = allQuestions.filter(q => correctSet.has(q.id));
                if (filtered.length === 0) { filterMode = 'all'; setActiveFilterButton('all'); filtered = allQuestions; }
            }
            return filtered;
        }

        function pickRandomQuestion() {
            const available = getAvailableQuestions();
            return available.length ? available[Math.floor(Math.random() * available.length)] : allQuestions[0];
        }

        function loadNewQuestion() {
            answered = false; optionsDisabled = false;
            [inputBtn, toolBtn, outputBtn].forEach(btn => btn.disabled = false);
            feedbackDiv.classList.remove('correct-feedback','wrong-feedback');
            currentQuestion = pickRandomQuestion();
            const proc = currentQuestion.process;
            pgLabel.textContent = proc.pg; kaLabel.textContent = proc.ka; pNameLabel.textContent = proc.name;
            ittoText.textContent = currentQuestion.text;
            feedbackDiv.textContent = `🔎 题库: ${ {all:'全部',wrong:'错题',correct:'对题'}[filterMode] } · 判断类型`;
            updateStats();
        }

        function updateStats() {
            scoreSpan.textContent = score; progressSpan.textContent = `${totalAnswered} 题`; streakSpan.textContent = `⚡ 连对 ${streak}`;
        }

        function handleAnswer(selectedType) {
            if (answered || optionsDisabled) return;
            answered = true; optionsDisabled = true;
            [inputBtn, toolBtn, outputBtn].forEach(btn => btn.disabled = true);
            const isCorrect = (selectedType === currentQuestion.type);
            const typeName = { input:'输入', tool:'工具与技术', output:'输出' }[currentQuestion.type];
            const qid = currentQuestion.id;
            wrongSet.delete(qid); correctSet.delete(qid);
            if (isCorrect) { score+=10; streak+=1; correctSet.add(qid); feedbackDiv.classList.add('correct-feedback'); }
            else { streak=0; wrongSet.add(qid); feedbackDiv.classList.add('wrong-feedback'); }
            totalAnswered++;
            feedbackDiv.textContent = isCorrect ? `✅ 正确！“${currentQuestion.text}” 是 ${typeName}` : `❌ 错误。“${currentQuestion.text}” 应该是 【${typeName}】`;
            saveToStorage(); updateStats();
        }

        function nextQuestion() { loadNewQuestion(); }
        function skipQuestion() {
            if (!answered) { streak=0; totalAnswered++; saveToStorage(); updateStats(); }
            nextQuestion();
        }

        function switchMode(mode) { filterMode = mode; setActiveFilterButton(mode); loadNewQuestion(); }

        // 渲染速查表 (过程、输入、工具)
        function renderMatrixTables() {
            let procHtml = '<table style="width:100%; border-collapse:collapse;">';
            procHtml += '<tr style="background:#1e3a5f; color:white;"><th>过程组</th><th>领域</th><th>过程</th></tr>';
            processesData.forEach(p => { procHtml += `<tr><td>${p.pg}</td><td>${p.ka}</td><td>${p.name}</td></tr>`; });
            procHtml += '</table>';
            document.getElementById('matrixTable').innerHTML = procHtml;

            let inputHtml = '<table style="width:100%; border-collapse:collapse;">';
            inputHtml += '<tr style="background:#1e3a5f; color:white;"><th>过程</th><th>主要输入</th></tr>';
            processesData.forEach(p => { inputHtml += `<tr><td>${p.name}</td><td>${p.inputs.join('；')}</td></tr>`; });
            inputHtml += '</table>';
            document.getElementById('inputMatrix').innerHTML = inputHtml;

            let toolHtml = '<table style="width:100%; border-collapse:collapse;">';
            toolHtml += '<tr style="background:#1e3a5f; color:white;"><th>过程</th><th>主要工具与技术</th></tr>';
            processesData.forEach(p => { toolHtml += `<tr><td>${p.name}</td><td>${p.tools.join('；')}</td></tr>`; });
            toolHtml += '</table>';
            document.getElementById('toolMatrix').innerHTML = toolHtml;
        }

        function initGame() {
            renderMatrixTables();
            loadFromStorage();
            setActiveFilterButton(filterMode);
            loadNewQuestion();
            inputBtn.addEventListener('click', ()=>handleAnswer('input'));
            toolBtn.addEventListener('click', ()=>handleAnswer('tool'));
            outputBtn.addEventListener('click', ()=>handleAnswer('output'));
            nextBtn.addEventListener('click', nextQuestion);
            skipBtn.addEventListener('click', skipQuestion);
            loadAllBtn.addEventListener('click', ()=>switchMode('all'));
            loadWrongBtn.addEventListener('click', ()=>switchMode('wrong'));
            loadCorrectBtn.addEventListener('click', ()=>switchMode('correct'));
            resetBtn.addEventListener('click', fullReset);
        }
        initGame();
    })();
</script>
</body>
</html>
