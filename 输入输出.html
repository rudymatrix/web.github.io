            { pg:"执行过程组", ka:"沟通管理", name:"33. 管理沟通",
              inputs:["沟通管理计划","工作绩效报告","相关方参与计划"],
              tools:["沟通技术","沟通技能","项目报告","人际关系与团队技能"],
              outputs:["项目沟通记录","项目管理计划更新"] },
            { pg:"执行过程组", ka:"风险管理", name:"34. 实施风险应对",
              inputs:["风险管理计划","风险登记册","风险报告"],
              tools:["专家判断","人际关系与团队技能(影响力)","项目管理信息系统"],
              outputs:["变更请求","风险登记册更新"] },
            { pg:"执行过程组", ka:"采购管理", name:"35. 实施采购",
              inputs:["采购管理计划","采购文档","卖方建议书","项目进度计划"],
              tools:["投标人会议","数据分析(建议书评价)","谈判"],
              outputs:["选定的卖方","协议","变更请求"] },
            { pg:"执行过程组", ka:"相关方管理", name:"36. 管理干系人参与",
              inputs:["沟通管理计划","相关方参与计划","变更日志","问题日志"],
              tools:["沟通技能(反馈)","人际关系技能(冲突/谈判)","基本规则"],
              outputs:["变更请求","项目管理计划更新"] },

            // 监控过程组 (12个)
            { pg:"监控过程组", ka:"整合管理", name:"37. 监控项目工作",
              inputs:["项目管理计划","工作绩效信息","进度/成本预测","风险报告"],
              tools:["专家判断","数据分析(趋势/偏差/挣值)","会议"],
              outputs:["工作绩效报告","变更请求"] },
            { pg:"监控过程组", ka:"整合管理", name:"38. 实施整体变更控制",
              inputs:["项目管理计划","变更请求","工作绩效报告"],
              tools:["专家判断","变更控制工具","决策(投票/独裁)"],
              outputs:["批准的变更请求","项目管理计划更新"] },
            { pg:"监控过程组", ka:"范围管理", name:"39. 确认范围",
              inputs:["项目管理计划","需求文件","核实的可交付成果"],
              tools:["检查","决策(投票)"],
              outputs:["验收的可交付成果","变更请求"] },
            { pg:"监控过程组", ka:"范围管理", name:"40. 控制范围",
              inputs:["范围基准","需求跟踪矩阵","工作绩效数据"],
              tools:["数据分析(偏差/趋势)"],
              outputs:["工作绩效信息","变更请求"] },
            { pg:"监控过程组", ka:"进度管理", name:"41. 控制进度",
              inputs:["进度管理计划","进度基准","工作绩效数据","项目日历"],
              tools:["数据分析(挣值/偏差/趋势)","关键路径法","资源优化","进度压缩"],
              outputs:["工作绩效信息","进度预测","变更请求"] },
            { pg:"监控过程组", ka:"成本管理", name:"42. 控制成本",
              inputs:["成本基准","绩效测量基准","工作绩效数据","项目资金需求"],
              tools:["数据分析(挣值/偏差/趋势)","完工尚需绩效指数","项目管理信息系统"],
              outputs:["工作绩效信息","成本预测","变更请求"] },
            { pg:"监控过程组", ka:"质量管理", name:"43. 控制质量",
              inputs:["质量管理计划","质量测量指标","可交付成果","批准的变更请求"],
              tools:["检查","测试/产品评估","数据收集(核查表/统计抽样)","数据表现(控制图/直方图)"],
              outputs:["质量控制测量结果","核实的可交付成果","变更请求"] },
            { pg:"监控过程组", ka:"资源管理", name:"44. 控制资源",
              inputs:["资源管理计划","物质资源分配单","工作绩效数据","协议"],
              tools:["数据分析(绩效审查/趋势)","问题解决","谈判"],
              outputs:["工作绩效信息","变更请求"] },
            { pg:"监控过程组", ka:"沟通管理", name:"45. 监督沟通",
              inputs:["沟通管理计划","项目沟通记录","工作绩效数据"],
              tools:["专家判断","项目管理信息系统","数据分析(相关方分析)"],
              outputs:["工作绩效信息","变更请求"] },
            { pg:"监控过程组", ka:"风险管理", name:"46. 监督风险",
              inputs:["风险管理计划","风险登记册","工作绩效数据","工作绩效报告"],
              tools:["数据分析(技术绩效/储备分析)","审计","会议"],
              outputs:["工作绩效信息","变更请求"] },
            { pg:"监控过程组", ka:"采购管理", name:"47. 控制采购",
              inputs:["采购管理计划","采购文档","工作绩效数据","批准的变更请求"],
              tools:["检查","审计","数据分析(绩效审查/挣值)","索赔管理"],
              outputs:["结束的采购","变更请求"] },
            { pg:"监控过程组", ka:"相关方管理", name:"48. 监督干系人参与",
              inputs:["沟通/相关方参与计划","相关方登记册","工作绩效数据"],
              tools:["数据分析(备选方案/根本原因)","相关方参与度评估矩阵","沟通技能"],
              outputs:["工作绩效信息","变更请求"] },

            // 收尾过程组
            { pg:"收尾过程组", ka:"整合管理", name:"49. 结束项目或阶段",
              inputs:["项目章程","项目管理计划","验收的可交付成果","商业文件","协议"],
              tools:["专家判断","数据分析(回归/趋势)","会议"],
              outputs:["最终产品/服务移交","最终报告","组织过程资产更新"] }
        ];

        // ---------- 游戏状态 ----------
        let currentProcess = null;
        let currentIttoItem = { text: '', type: '' }; // 'input','tool','output'
        let optionsDisabled = false;
        let answered = false;
        let score = 0;
        let totalAnswered = 0;
        let streak = 0;
        let currentQuestionType = ''; // 正确答案类型

        // DOM 元素
        const pgLabel = document.getElementById('processGroupLabel');
        const kaLabel = document.getElementById('knowledgeAreaLabel');
        const pNameLabel = document.getElementById('processNameLabel');
        const ittoText = document.getElementById('ittoText');
        const feedbackDiv = document.getElementById('feedbackArea');
        const scoreSpan = document.getElementById('scoreDisplay');
        const progressSpan = document.getElementById('progressDisplay');
        const streakSpan = document.getElementById('streakBadge');
        const inputBtn = document.getElementById('inputBtn');
        const toolBtn = document.getElementById('toolBtn');
        const outputBtn = document.getElementById('outputBtn');
        const nextBtn = document.getElementById('nextBtn');
        const skipBtn = document.getElementById('skipBtn');

        // 辅助函数：随机选取过程
        function getRandomProcess() {
            return processesData[Math.floor(Math.random() * processesData.length)];
        }

        // 从过程对象中随机抽取一个ITTO条目
        function pickRandomIttoFromProcess(proc) {
            const pool = [];
            // 添加输入
            proc.inputs.forEach(t => pool.push({ text: t, type: 'input' }));
            proc.tools.forEach(t => pool.push({ text: t, type: 'tool' }));
            proc.outputs.forEach(t => pool.push({ text: t, type: 'output' }));
            if (pool.length === 0) return { text: '无条目', type: 'input' };
            return pool[Math.floor(Math.random() * pool.length)];
        }

        // 刷新显示
        function loadNewQuestion() {
            // 重置状态
            answered = false;
            optionsDisabled = false;
            [inputBtn, toolBtn, outputBtn].forEach(btn => { btn.disabled = false; });
            // 移除特殊样式
            feedbackDiv.classList.remove('correct-feedback', 'wrong-feedback');
            
            // 随机过程
            currentProcess = getRandomProcess();
            const ittoObj = pickRandomIttoFromProcess(currentProcess);
            currentIttoItem = ittoObj;
            currentQuestionType = ittoObj.type;

            // 更新界面
            pgLabel.textContent = currentProcess.pg;
            kaLabel.textContent = currentProcess.ka;
            pNameLabel.textContent = currentProcess.name;
            ittoText.textContent = ittoObj.text;
            feedbackDiv.textContent = '🤔 它是输入、工具还是输出？';
            
            // 更新进度显示
            updateStats();
        }

        function updateStats() {
            scoreSpan.textContent = score;
            progressSpan.textContent = `${totalAnswered} 题`;
            streakSpan.textContent = `⚡ 连对 ${streak}`;
        }

        // 处理回答
        function handleAnswer(selectedType) {
            if (answered || optionsDisabled) return;
            answered = true;
            optionsDisabled = true;
            [inputBtn, toolBtn, outputBtn].forEach(btn => { btn.disabled = true; });

            const isCorrect = (selectedType === currentQuestionType);
            let feedbackMsg = '';
            let typeName = { input:'输入', tool:'工具与技术', output:'输出' }[currentQuestionType];
            
            if (isCorrect) {
                score += 10;
                streak += 1;
                feedbackMsg = `✅ 正确！ “${currentIttoItem.text}” 属于 ${typeName}`;
                feedbackDiv.classList.add('correct-feedback');
                feedbackDiv.classList.remove('wrong-feedback');
            } else {
                streak = 0;
                feedbackMsg = `❌ 不正确。 “${currentIttoItem.text}” 应该是 【${typeName}】`;
                feedbackDiv.classList.add('wrong-feedback');
                feedbackDiv.classList.remove('correct-feedback');
            }
            totalAnswered++;
            feedbackDiv.textContent = feedbackMsg;
            updateStats();
        }

        // 下一题
        function nextQuestion() {
            loadNewQuestion();
        }

        // 跳过
        function skipQuestion() {
            if (!answered) {
                streak = 0;
                feedbackDiv.textContent = `⏩ 已跳过。正确答案是：${ {input:'输入',tool:'工具与技术',output:'输出'}[currentQuestionType] }`;
                feedbackDiv.classList.remove('correct-feedback','wrong-feedback');
                answered = true;
                optionsDisabled = true;
                [inputBtn, toolBtn, outputBtn].forEach(btn => { btn.disabled = true; });
                totalAnswered++;
                updateStats();
            } else {
                // 如果已经回答，跳过变成下一题
                nextQuestion();
            }
        }

        // 生成简表 (用于折叠区)
        function renderMatrixTable() {
            let html = '<table style="width:100%; border-collapse:collapse; font-size:0.75rem;">';
            html += '<tr style="background:#1e3a5f; color:white;"><th>过程组</th><th>知识领域</th><th>过程</th></tr>';
            processesData.forEach(p => {
                html += `<tr style="border-bottom:1px solid #b0c8dd;"><td>${p.pg}</td><td>${p.ka}</td><td>${p.name}</td></tr>`;
            });
            html += '</table>';
            document.getElementById('matrixTable').innerHTML = html;
        }

        // 绑定事件
        function bindEvents() {
            inputBtn.addEventListener('click', () => handleAnswer('input'));
            toolBtn.addEventListener('click', () => handleAnswer('tool'));
            outputBtn.addEventListener('click', () => handleAnswer('output'));
            nextBtn.addEventListener('click', nextQuestion);
            skipBtn.addEventListener('click', skipQuestion);
        }

        // 初始化
        function initGame() {
            renderMatrixTable();
            loadNewQuestion();
            bindEvents();
            updateStats();
        }

        initGame();
    })();
</script>
