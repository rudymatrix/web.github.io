            border: 1px solid rgba(255,255,255,0.5);

            font-size: 1.2rem;
            letter-spacing: 1px;
            box-shadow: 0 4px 8px #0f2a4420;
        }

            display: flex;
            gap: 6px;
            margin: 5px 0;
        }
        .mini-btn {
            background: #eef2f6;
            border: 1px solid #b8c9dd;
            color: #1e3a5f;
            padding: 8px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 2px 4px #00000008;
            white-space: nowrap;
        }
        .mini-btn.active {
            background: #1e3a5f;
            color: white;
            border-color: #1e3a5f;
        }
        .mini-btn.reset-btn {
            background: #fce4d6;
            border-color: #c44536;
            color: #a1301a;
        }

            display: flex;
            justify-content: space-between;

            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
        }

            border-radius: 28px;
            padding: 18px 22px;
            margin-bottom: 24px;
            box-shadow: 0 8px 18px -6px #1e3a5f1a;

            flex-wrap: wrap;
            gap: 12px 20px;
            margin-bottom: 12px;
            color: #2c3e50;
            font-weight: 500;
            border-bottom: 1px dashed #b0c8dd;

            font-weight: 600;
            color: #0a1c2c;
            text-align: center;
            line-height: 1.4;

            font-size: 1.2rem;
            font-weight: 600;
            color: #1e3a5f;

            background: #1e3a5f;

</head>
<body>

            { pg:"监控过程组", ka:"整合管理", name:"37. 监控项目工作",
              inputs:["项目管理计划","工作绩效信息","进度/成本预测"],
              tools:["专家判断","数据分析(趋势/偏差/挣值)","会议"],
              outputs:["工作绩效报告","变更请求"] },
            { pg:"监控过程组", ka:"整合管理", name:"38. 实施整体变更控制",
              inputs:["项目管理计划","变更请求","工作绩效报告"],
              tools:["专家判断","变更控制工具","决策"],
              outputs:["批准的变更请求"] },
            { pg:"监控过程组", ka:"范围管理", name:"39. 确认范围",
              inputs:["项目管理计划","需求文件","核实的可交付成果"],
              tools:["检查"],
              outputs:["验收的可交付成果"] },
            { pg:"监控过程组", ka:"范围管理", name:"40. 控制范围",
              inputs:["范围基准","需求跟踪矩阵","工作绩效数据"],
              tools:["数据分析(偏差/趋势)"],
              outputs:["工作绩效信息"] },
            { pg:"监控过程组", ka:"进度管理", name:"41. 控制进度",
              inputs:["进度管理计划","进度基准","工作绩效数据"],
              tools:["数据分析(挣值/偏差)","关键路径法","进度压缩"],
              outputs:["工作绩效信息","进度预测"] },
            { pg:"监控过程组", ka:"成本管理", name:"42. 控制成本",
              inputs:["成本基准","工作绩效数据"],
              tools:["数据分析(挣值/偏差/趋势)","完工尚需绩效指数"],
              outputs:["工作绩效信息","成本预测"] },
            { pg:"监控过程组", ka:"质量管理", name:"43. 控制质量",
              inputs:["质量管理计划","质量测量指标","可交付成果"],
              tools:["检查","数据表现(控制图)","统计抽样"],
              outputs:["质量控制测量结果","核实的可交付成果"] },
            { pg:"监控过程组", ka:"资源管理", name:"44. 控制资源",
              inputs:["资源管理计划","物质资源分配单","工作绩效数据"],
              tools:["数据分析(绩效审查)","问题解决","谈判"],
              outputs:["工作绩效信息"] },
            { pg:"监控过程组", ka:"沟通管理", name:"45. 监督沟通",
              inputs:["沟通管理计划","项目沟通记录","工作绩效数据"],
              tools:["专家判断","项目管理信息系统"],
              outputs:["工作绩效信息"] },
            { pg:"监控过程组", ka:"风险管理", name:"46. 监督风险",
              inputs:["风险管理计划","风险登记册","工作绩效数据"],
              tools:["数据分析(技术绩效/储备分析)","审计"],
              outputs:["工作绩效信息"] },
            { pg:"监控过程组", ka:"采购管理", name:"47. 控制采购",
              inputs:["采购管理计划","采购文档","工作绩效数据"],
              tools:["检查","审计","索赔管理"],
              outputs:["结束的采购"] },
            { pg:"监控过程组", ka:"相关方管理", name:"48. 监督干系人参与",
              inputs:["相关方参与计划","相关方登记册","工作绩效数据"],
              tools:["相关方参与度评估矩阵"],
              outputs:["工作绩效信息"] },
            { pg:"收尾过程组", ka:"整合管理", name:"49. 结束项目或阶段",
              inputs:["项目章程","验收的可交付成果","协议"],
              tools:["专家判断","会议"],
              outputs:["最终报告","组织过程资产更新"] }
        ];

        // ---------- 构建全量题库 (每个ITTO条目一个对象) ----------
        let allQuestions = [];
        processesData.forEach((proc, procIdx) => {
            const addItems = (type, items) => {
                items.forEach(text => {
                    allQuestions.push({
                        procIdx,
                        process: proc,
                        type: type,        // 'input','tool','output'
                        text: text,
                        id: `${procIdx}-${type}-${text}`
                    });
                });
            };
            addItems('input', proc.inputs);
            addItems('tool', proc.tools);
            addItems('output', proc.outputs);
        });

        // ---------- 状态管理 ----------
        let currentQuestion = null;          // 当前显示的题目对象 (来自allQuestions)
        let answered = false;
        let optionsDisabled = false;
        let score = 0;
        let totalAnswered = 0;
        let streak = 0;

        // 错题本 & 对题本 (存储id)
        let wrongSet = new Set();
        let correctSet = new Set();

        // 加载模式: 'all', 'wrong', 'correct'
        let filterMode = 'wrong';   // 默认优先错题

        // DOM 元素
        const pgLabel = document.getElementById('processGroupLabel');
        const kaLabel = document.getElementById('knowledgeAreaLabel');
        const pNameLabel = document.getElementById('processNameLabel');
        const ittoText = document.getElementById('ittoText');
        const feedbackDiv = document.getElementById('feedbackArea');
        const scoreSpan = document.getElementById('scoreDisplay');
        const progressSpan = document.getElementById('progressDisplay');
        const streakSpan = document.getElementById('streakBadge');
        const inputBtn = document.getElementById('inputBtn');
        const toolBtn = document.getElementById('toolBtn');
        const outputBtn = document.getElementById('outputBtn');
        const nextBtn = document.getElementById('nextBtn');
        const skipBtn = document.getElementById('skipBtn');
        const loadAllBtn = document.getElementById('loadAllBtn');
        const loadWrongBtn = document.getElementById('loadWrongBtn');
        const loadCorrectBtn = document.getElementById('loadCorrectBtn');
        const resetBtn = document.getElementById('resetBtn');
        const clockEl = document.getElementById('liveClock');

        // 按钮激活样式
        function setActiveFilterButton(mode) {
            [loadAllBtn, loadWrongBtn, loadCorrectBtn].forEach(btn => btn.classList.remove('active'));
            if (mode === 'all') loadAllBtn.classList.add('active');
            if (mode === 'wrong') loadWrongBtn.classList.add('active');
            if (mode === 'correct') loadCorrectBtn.classList.add('active');
        }

        // ---------- 本地存储 ----------
        const STORAGE_KEYS = {
            WRONG: 'pmbok_itto_wrong',
            CORRECT: 'pmbok_itto_correct',
            SCORE: 'pmbok_score',
            TOTAL: 'pmbok_total',
            STREAK: 'pmbok_streak'
        };

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEYS.WRONG, JSON.stringify([...wrongSet]));
            localStorage.setItem(STORAGE_KEYS.CORRECT, JSON.stringify([...correctSet]));
            localStorage.setItem(STORAGE_KEYS.SCORE, score);
            localStorage.setItem(STORAGE_KEYS.TOTAL, totalAnswered);
            localStorage.setItem(STORAGE_KEYS.STREAK, streak);
        }

        function loadFromStorage() {
            try {
                const w = localStorage.getItem(STORAGE_KEYS.WRONG);
                if (w) wrongSet = new Set(JSON.parse(w));
                const c = localStorage.getItem(STORAGE_KEYS.CORRECT);
                if (c) correctSet = new Set(JSON.parse(c));
                score = parseInt(localStorage.getItem(STORAGE_KEYS.SCORE)) || 0;
                totalAnswered = parseInt(localStorage.getItem(STORAGE_KEYS.TOTAL)) || 0;
                streak = parseInt(localStorage.getItem(STORAGE_KEYS.STREAK)) || 0;
            } catch(e) { /* 忽略 */ }
            updateStats();
        }

        // 重置所有数据
        function fullReset() {
            wrongSet.clear();
            correctSet.clear();
            score = 0;
            totalAnswered = 0;
            streak = 0;
            filterMode = 'wrong';
            setActiveFilterButton('wrong');
            saveToStorage();
            updateStats();
            loadNewQuestion();
            feedbackDiv.textContent = '✨ 已重置，从错题模式开始';
            feedbackDiv.classList.remove('correct-feedback','wrong-feedback');
        }

        // ---------- 根据模式获取可用题目列表 ----------
        function getAvailableQuestions() {
            let filtered = allQuestions;
            if (filterMode === 'wrong') {
                filtered = allQuestions.filter(q => wrongSet.has(q.id));
                if (filtered.length === 0) {
                    // 错题本为空，自动切回全部模式
                    filterMode = 'all';
                    setActiveFilterButton('all');
                    filtered = allQuestions;
                    feedbackDiv.textContent = '📭 错题本为空，已切换到全部题目';
                }
            } else if (filterMode === 'correct') {
                filtered = allQuestions.filter(q => correctSet.has(q.id));
                if (filtered.length === 0) {
                    filterMode = 'all';
                    setActiveFilterButton('all');
                    filtered = allQuestions;
                    feedbackDiv.textContent = '📭 对题本为空，已切换到全部题目';
                }
            }
            return filtered;
        }

        // 随机抽取题目
        function pickRandomQuestion() {
            const available = getAvailableQuestions();
            if (available.length === 0) {
                // 极端情况：全部模式也没有题目（不可能）
                return allQuestions[0];
            }
            return available[Math.floor(Math.random() * available.length)];
        }

        // 刷新显示
        function loadNewQuestion() {
            answered = false;
            optionsDisabled = false;
            [inputBtn, toolBtn, outputBtn].forEach(btn => { btn.disabled = false; });
            feedbackDiv.classList.remove('correct-feedback', 'wrong-feedback');
            
            currentQuestion = pickRandomQuestion();
            const proc = currentQuestion.process;
            
            pgLabel.textContent = proc.pg;
            kaLabel.textContent = proc.ka;
            pNameLabel.textContent = proc.name;
            ittoText.textContent = currentQuestion.text;
            
            const modeText = { all:'全部', wrong:'错题', correct:'对题' }[filterMode] || '';
            feedbackDiv.textContent = `🔎 当前题库：${modeText} · 判断类型`;
            
            updateStats();
        }

        function updateStats() {
            scoreSpan.textContent = score;
            progressSpan.textContent = `${totalAnswered} 题`;
            streakSpan.textContent = `⚡ 连对 ${streak}`;
        }

        // 处理回答
        function handleAnswer(selectedType) {
            if (answered || optionsDisabled) return;
            answered = true;
            optionsDisabled = true;
            [inputBtn, toolBtn, outputBtn].forEach(btn => { btn.disabled = true; });

            const isCorrect = (selectedType === currentQuestion.type);
            const typeName = { input:'输入', tool:'工具与技术', output:'输出' }[currentQuestion.type];
            const qid = currentQuestion.id;
            
            // 从两个Set中先移除 (避免重复)
            wrongSet.delete(qid);
            correctSet.delete(qid);
            
            if (isCorrect) {
                score += 10;
                streak += 1;
                correctSet.add(qid);
                feedbackDiv.textContent = `✅ 正确！ “${currentQuestion.text}” 属于 ${typeName}`;
                feedbackDiv.classList.add('correct-feedback');
                feedbackDiv.classList.remove('wrong-feedback');
            } else {
                streak = 0;
                wrongSet.add(qid);
                feedbackDiv.textContent = `❌ 错误。 “${currentQuestion.text}” 应该是 【${typeName}】`;
                feedbackDiv.classList.add('wrong-feedback');
                feedbackDiv.classList.remove('correct-feedback');
            }
            totalAnswered++;
            saveToStorage();
            updateStats();
        }

        // 下一题
        function nextQuestion() {
            loadNewQuestion();
        }

        // 跳过 (不记录对错，只更新题库切换时的状态)
        function skipQuestion() {
            if (!answered) {
                streak = 0;
                feedbackDiv.textContent = `⏩ 已跳过，正确答案：${ {input:'输入',tool:'工具与技术',output:'输出'}[currentQuestion.type] }`;
                answered = true;
                optionsDisabled = true;
                [inputBtn, toolBtn, outputBtn].forEach(btn => { btn.disabled = true; });
                totalAnswered++;
                saveToStorage();
                updateStats();
            } else {
                nextQuestion();
            }
        }

        // 切换模式
        function switchMode(mode) {
            filterMode = mode;
            setActiveFilterButton(mode);
            loadNewQuestion();
        }

        // ---------- 时钟 (右上角显示当前时间) ----------
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2,'0');
            const m = String(now.getMinutes()).padStart(2,'0');
            const s = String(now.getSeconds()).padStart(2,'0');
            clockEl.textContent = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 500);
        updateClock();

        // ---------- 渲染速查表 ----------
        function renderMatrixTable() {
            let html = '<table style="width:100%; border-collapse:collapse;">';
            html += '<tr style="background:#1e3a5f; color:white;"><th>过程组</th><th>知识领域</th><th>过程</th></tr>';
            processesData.forEach(p => {
                html += `<tr style="border-bottom:1px solid #b0c8dd;"><td>${p.pg}</td><td>${p.ka}</td><td>${p.name}</td></tr>`;
            });
            html += '</table>';
            document.getElementById('matrixTable').innerHTML = html;
        }

        // ---------- 初始化 ----------
        function initGame() {
            renderMatrixTable();
            loadFromStorage();
            // 确保默认激活样式
            setActiveFilterButton(filterMode);
            loadNewQuestion();
            
            // 绑定事件
            inputBtn.addEventListener('click', () => handleAnswer('input'));
            toolBtn.addEventListener('click', () => handleAnswer('tool'));
            outputBtn.addEventListener('click', () => handleAnswer('output'));
            nextBtn.addEventListener('click', nextQuestion);
            skipBtn.addEventListener('click', skipQuestion);
            
            loadAllBtn.addEventListener('click', () => switchMode('all'));
            loadWrongBtn.addEventListener('click', () => switchMode('wrong'));
            loadCorrectBtn.addEventListener('click', () => switchMode('correct'));
            resetBtn.addEventListener('click', fullReset);
        }

        initGame();
    })();
</script>
</body>
</html>
